services:
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: podman-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: podman_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ptest"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: localhost/podman-test-rabbitmq:latest
    build:
      context: ./rabbitmq
      dockerfile: Containerfile
    container_name: podman-test-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: localhost/podman-test-app:latest
    build:
      context: .
      dockerfile: Containerfile
    container_name: podman-test-api-compose
    environment:
      DB_URL: jdbc:mysql://mysql:3306/podman_test?createDatabaseIfNotExist=false&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MESSAGING_ENABLED: "true"
      MESSAGING_QUEUE: podman.test.messages
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
